name: Generate Docker Container

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout Repository
        id: checkout-repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Branch Name
        id: branch-name
        uses: tj-actions/branch-names@v9

      - id: commit
        uses: prompt/actions-commit-hash@v4

      - name: Generate Tag
        id: generate-tag
        env:
          BRANCH_NAME: ${{ steps.branch-name.outputs.current_branch }}
        run: |
          # Docker tags only allow [a-zA-Z0-9_.-]; replace anything else (e.g. the
          # "/" in branch names like "fix/foo") with "-" so the tag is valid.
          safe_branch=$(printf '%s' "$BRANCH_NAME" | tr -c 'a-zA-Z0-9_.-' '-')
          echo "release_tag=mtgjson:$(date +"%Y-%m-%d_%H-%M")-${safe_branch}" >> "$GITHUB_OUTPUT"

      - name: Build Image
        id: build-image
        run: docker build --no-cache -t ${{ steps.generate-tag.outputs.release_tag }} .

      - name: Upload Image to GitHub Actions Archive
        id: upload-gha
        uses: ishworkh/container-image-artifact-upload@v2.0.0
        with:
          image: "${{ steps.generate-tag.outputs.release_tag }}"

      - name: Upload Image to Amazon ECR (master)
        if: ${{ github.event_name == 'push' && steps.branch-name.outputs.current_branch == 'master' }}
        id: upload-ecr
        uses: jwalton/gh-ecr-push@v2
        with:
          access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_ECR_UPLOADER }}
          secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ECR_UPLOADER }}
          region: us-east-1
          local-image: ${{ steps.generate-tag.outputs.release_tag }}
          image: ${{ steps.generate-tag.outputs.release_tag }}, mtgjson:${{ steps.commit.outputs.short }}, mtgjson:latest

      - name: Upload Image to Amazon ECR (PR)
        if: ${{ github.event_name == 'pull_request' }}
        id: upload-ecr-pr
        uses: jwalton/gh-ecr-push@v2
        with:
          access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_ECR_UPLOADER }}
          secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ECR_UPLOADER }}
          region: us-east-1
          local-image: ${{ steps.generate-tag.outputs.release_tag }}
          image: mtgjson-pull-requests:pr-${{ github.event.pull_request.number }}-${{ steps.commit.outputs.short }}, mtgjson-pull-requests:pr-${{ github.event.pull_request.number }}
